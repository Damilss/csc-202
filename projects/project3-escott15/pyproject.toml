[tool.ruff]
preview = true

[tool.ruff.lint]
# the list of rules is at: https://docs.astral.sh/ruff/rules/
select = [
    # Basic checks
    "E", "F", "W",
    # Pythonic names
    "N",
    # Commented out code
    "ERA",
    # Missing type annotations
    "ANN001", "ANN002",
    # Import order
    "I",
    # Docstrings
    "D103", "D200", "D201", "D210", "D300", "D403", "D419",
    # Nitpicky
    "A",       # Builtin shadowing
    "PIE790",  # Unnecessary pass
    "T20",     # Print statement
    "FIX",     # Line contains TODO
]

# These are annoying when they autofix before you're ready to use the
# import/variable
extend-unsafe-fixes = [
   "F401",  # unused import
   "F841",  # unused variable
]

[tool.ruff.lint.flake8-annotations]
suppress-none-returning = true

[tool.ruff.lint.isort.sections]
typing = ["typing", "collections.abc"]
